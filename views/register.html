<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kayıt Ol – Kur Takip</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!--NAVBAR-->

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Kayıt Ol</h2>
      <form action="/register" method="POST">
        <!--CSRF-->
        <div class="form-group">
          <label for="username">Kullanıcı Adı</label>
          <input type="text" id="username" name="username" placeholder="Kullanıcı adınız" required />
        </div>
        <div class="form-group">
          <label for="password">Şifre</label>
          <input type="password" id="password" name="password" placeholder="Şifreniz" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Kayıt Ol</button>
      </form>
      <p class="auth-footer">Zaten hesabınız var mı? <a href="/login">Giriş Yap</a></p>
    </div>
  </div>

</body>
</html>
