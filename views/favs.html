<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Favorilerim – Kur Takip</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!--NAVBAR-->

  <main class="page">
    <div class="card">
      <h2>Favori Kurlarınız</h2>
      <div class="favs-toolbar mt-3">
        <input id="favs-search" type="search" placeholder="Parite veya banka ara..." aria-label="Favori arama" />
        <select id="favs-sort" aria-label="Favori sıralama">
          <option value="pair">Parite</option>
          <option value="providerName">Banka</option>
          <option value="spread">Makas</option>
          <option value="changePct">Değişim %</option>
          <option value="time">Güncellik</option>
        </select>
        <button id="favs-sort-dir" class="btn btn-sm" type="button" aria-label="Sıralama yönü">Artan ↑</button>
      </div>
      <p id="favs-meta" class="mt-3 text-muted">Favorilerim yukleniyor...</p>
      <div class="currency-table-wrap mt-3">
        <table class="currency-table">
          <thead>
            <tr>
              <th>Parite</th>
              <th>Banka</th>
              <th>Alış</th>
              <th>Satış</th>
              <th>Makas</th>
              <th>Değişim %</th>
              <th>Saat</th>
              <th>İşlem</th>
            </tr>
          </thead>
          <tbody id="favs-list-body"></tbody>
        </table>
      </div>
      <div id="favs-undo" class="favs-undo hidden" role="status" aria-live="polite">
        <span id="favs-undo-text"></span>
        <button id="favs-undo-btn" class="btn btn-sm" type="button">Geri Al</button>
      </div>
    </div>
  </main>

  <script type="module" src="/favsLoader.js"></script>

</body>
</html>
