<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kur Takip – Ana Sayfa</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!--NAVBAR-->

  <main class="page">

    <!-- Hero -->
    <section class="hero">
      <h1 class="hero__title">Döviz Kurlarını Takip Edin</h1>
      <p class="hero__sub">Güncel döviz kurlarını, grafikleri ve favori paritelerinizi tek ekranda görüntüleyin.</p>
    </section>

    <!-- Summary cards (populated by future issues) -->
    <div class="summary-grid">
      <div class="summary-card">
        <span class="summary-card__label">USD/TRY</span>
        <span class="summary-card__value" id="val-usd">–</span>
        <span class="summary-card__change" id="chg-usd"></span>
      </div>
      <div class="summary-card">
        <span class="summary-card__label">EUR/TRY</span>
        <span class="summary-card__value" id="val-eur">–</span>
        <span class="summary-card__change" id="chg-eur"></span>
      </div>
      <div class="summary-card">
        <span class="summary-card__label">GBP/TRY</span>
        <span class="summary-card__value" id="val-gbp">–</span>
        <span class="summary-card__change" id="chg-gbp"></span>
      </div>
      <div class="summary-card">
        <span class="summary-card__label">ALTIN (gr)</span>
        <span class="summary-card__value" id="val-gold">–</span>
        <span class="summary-card__change" id="chg-gold"></span>
      </div>
    </div>

    <!-- Main content grid -->
    <div class="home-grid">

      <!-- Chart placeholder -->
      <div class="card">
        <div class="section-header">
          <h3>Kur Grafiği</h3>
          <div class="range-loader">
            <label for="range-start-date" class="range-label">Başlangıç</label>
            <input type="date" id="range-start-date" />
            <label for="range-end-date" class="range-label">Bitis</label>
            <input type="date" id="range-end-date" />
            <select id="chart-pair" aria-label="Grafik Paritesi">
              <option value="USD/TRY">USD/TRY</option>
              <option value="EUR/TRY">EUR/TRY</option>
              <option value="GBP/TRY">GBP/TRY</option>
              <option value="XAU/TRY">ALTIN (XAU/TRY)</option>
            </select>
            <button id="range-load-btn" class="btn btn-primary btn-sm" type="button">Grafiği Yükle</button>
          </div>
        </div>
        <div id="chart-meta" class="text-muted mt-2"></div>
        <div class="chart-wrap mt-3">
          <canvas id="range-chart" width="960" height="280" aria-label="Kur aralık grafiği"></canvas>
        </div>
      </div>

      <!-- Currency list placeholder -->
      <div class="card">
        <div class="section-header">
          <h3>Kur Listesi</h3>
        </div>
        <div id="currency-list-meta" class="text-muted mt-2"></div>
        <div class="currency-table-wrap mt-3">
          <table class="currency-table">
            <thead>
              <tr>
                <th class="col-fav" title="Favori" aria-label="Favori"></th>
                <th>Banka</th>
                <th data-sort="buy" class="th-sortable">Alış <button type="button" class="sort-btn" aria-label="Sırala">⇅</button></th>
                <th data-sort="sell" class="th-sortable">Satış <button type="button" class="sort-btn" aria-label="Sırala">⇅</button></th>
                <th data-sort="spread" class="th-sortable">Makas <button type="button" class="sort-btn" aria-label="Sırala">⇅</button></th>
                <th>Değişim %</th>
                <th>Son Güncelleme</th>
              </tr>
            </thead>
            <tbody id="currency-list-body"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    &copy; <span id="year"></span> Kur Takip
  </footer>

  <div id="loading-overlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
    <div class="loading-popup">
      <div class="spinner" aria-hidden="true"></div>
      <p id="loading-message">Yukleniyor...</p>
    </div>
  </div>

  <script type="module" src="/homeDataLoader.js"></script>

</body>
</html>
