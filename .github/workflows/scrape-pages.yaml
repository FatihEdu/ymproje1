name: Scrape Pages

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/scrape-pages.yaml"
      - "automation/scrape-pages/**"
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"
      timezone: "Europe/Istanbul"

concurrency:
  group: scrape-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect scraper package lockfile
        id: lockfile
        shell: bash
        run: |
          if [ -f "automation/scrape-pages/package-lock.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js with npm cache
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: automation/scrape-pages/package-lock.json

      - name: Setup Node.js without cache
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper module deps
        working-directory: automation/scrape-pages
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare temporary output directory
        run: mkdir -p gh-pages-worktree

      - name: Run scrapers
        working-directory: automation/scrape-pages
        env:
          SCRAPE_OUTPUT_ROOT: ${{ github.workspace }}/gh-pages-worktree
          SCRAPE_TIMEZONE: Europe/Istanbul
          SCRAPE_SLOT_MINUTES: "7"
        run: npm run scrape

  publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.detect_changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect scraper package lockfile
        id: lockfile
        shell: bash
        run: |
          if [ -f "automation/scrape-pages/package-lock.json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js with npm cache
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: automation/scrape-pages/package-lock.json

      - name: Setup Node.js without cache
        if: steps.lockfile.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper module deps
        working-directory: automation/scrape-pages
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare gh-pages worktree
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if git ls-remote --exit-code --heads "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages > /dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages-worktree
          else
            mkdir gh-pages-worktree
            cd gh-pages-worktree
            git init
            git checkout --orphan gh-pages
          fi

      - name: Run scrapers
        working-directory: automation/scrape-pages
        env:
          SCRAPE_OUTPUT_ROOT: ${{ github.workspace }}/gh-pages-worktree
          SCRAPE_TIMEZONE: Europe/Istanbul
          SCRAPE_SLOT_MINUTES: "7"
        run: npm run scrape

      - name: Ensure Pages marker
        run: touch gh-pages-worktree/.nojekyll

      - name: Detect gh-pages changes
        id: detect_changes
        working-directory: gh-pages-worktree
        shell: bash
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected."
          fi

      - name: Commit and push gh-pages data
        if: steps.detect_changes.outputs.changed == 'true'
        working-directory: gh-pages-worktree
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          else
            git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi

          git commit -m "chore(scrape-pages): update data"
          git push origin HEAD:gh-pages

      - name: Remove git metadata before Pages artifact upload
        if: steps.detect_changes.outputs.changed == 'true'
        run: rm -rf gh-pages-worktree/.git

      - name: Upload Pages artifact
        if: steps.detect_changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-worktree

  deploy:
    if: github.event_name != 'pull_request' && needs.publish.outputs.changed == 'true'
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4